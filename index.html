<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Polla Mundialista Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-primary { background: linear-gradient(90deg, #2563eb, #7c3aed); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <!-- Navegación -->
    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <h1 class="text-2xl font-extrabold tracking-tighter uppercase">
            <i class="fas fa-trophy mr-2 text-yellow-400"></i>Polla<span class="text-blue-400">Mundial</span>
        </h1>
        <div id="userInfo" class="hidden text-sm opacity-80 bg-slate-800 px-4 py-2 rounded-full border border-slate-700"></div>
    </nav>

    <main class="max-w-4xl mx-auto px-4">
        
        <!-- Registro Seccion -->
        <section id="loginSection" class="mt-10 glass p-8 rounded-3xl text-center shadow-2xl">
            <h2 class="text-3xl font-bold mb-4">Bienvenido, Participante</h2>
            <p class="mb-8 text-gray-400">Ingresa tus datos para empezar a predecir y ganar puntos.</p>
            <div class="flex flex-col gap-4 max-w-sm mx-auto">
                <input type="text" id="regNombre" placeholder="Tu Nombre Completo" class="bg-slate-800 border border-slate-700 rounded-xl p-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <input type="email" id="regEmail" placeholder="tu@correo.com" class="bg-slate-800 border border-slate-700 rounded-xl p-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <button onclick="handleLogin()" id="loginBtn" class="btn-primary p-4 rounded-xl font-bold uppercase tracking-widest text-white shadow-lg">
                    Entrar al Juego
                </button>
            </div>
            <p id="statusMsg" class="mt-4 text-xs text-blue-300"></p>
        </section>

        <!-- Dashboard Seccion (Oculto inicialmente) -->
        <section id="dashboard" class="hidden mt-6 space-y-8 animate-in fade-in duration-500">
            
            <!-- Ranking Top 3 -->
            <div class="grid grid-cols-1 gap-4">
                <div class="flex items-center justify-between mb-2">
                    <h3 class="text-xl font-semibold"><i class="fas fa-star mr-2 text-yellow-500"></i>Top 3 Líderes</h3>
                </div>
                <div id="rankingContainer" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <!-- Dinámico -->
                </div>
            </div>

            <!-- Lista de Partidos -->
            <div class="space-y-4">
                <h3 class="text-xl font-semibold"><i class="fas fa-calendar-alt mr-2 text-blue-400"></i>Próximos Partidos</h3>
                <div id="partidosList" class="grid gap-4">
                    <!-- Dinámico -->
                </div>
            </div>
        </section>
    </main>

    <script>
        let currentUser = null;
        
        // Verificación de entorno: Detecta si estamos en Google Apps Script
        const isGAS = typeof google !== 'undefined' && google.script && google.script.run;

        window.onload = () => {
            if (isGAS) {
                google.script.run.withSuccessHandler(res => {
                    console.log("Sistema GAS inicializado:", res);
                }).inicializarSistema();
            } else {
                console.warn("Entorno local detectado. Usando modo simulación para previsualización.");
                document.getElementById('statusMsg').innerText = "Modo previsualización (Simulado)";
            }
        };

        function handleLogin() {
            const nombre = document.getElementById('regNombre').value;
            const email = document.getElementById('regEmail').value;
            const btn = document.getElementById('loginBtn');

            if(!nombre || !email) {
                showToast("Por favor completa los campos");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch animate-spin mr-2"></i> Cargando...';

            if (isGAS) {
                google.script.run.withSuccessHandler(user => {
                    setupUserSession(user);
                }).registrarUsuario(nombre, email);
            } else {
                // Simulación local
                setTimeout(() => {
                    setupUserSession({ id: "mock-123", nombre: nombre, email: email, puntos: 15 });
                }, 800);
            }
        }

        function setupUserSession(user) {
            currentUser = user;
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            
            const userInfo = document.getElementById('userInfo');
            userInfo.innerHTML = `<i class="fas fa-user-circle mr-2"></i> ${user.nombre} | <span class="text-blue-400 font-bold ml-1">${user.puntos} pts</span>`;
            userInfo.classList.remove('hidden');
            
            loadDashboardData();
        }

        function loadDashboardData() {
            // Cargar Ranking
            if (isGAS) {
                google.script.run.withSuccessHandler(renderRanking).obtenerRanking();
                google.script.run.withSuccessHandler(renderPartidos).obtenerPartidos();
            } else {
                // Datos de prueba para previsualización
                renderRanking([
                    { nombre: "Usuario Pro", puntos: 25 },
                    { nombre: "Goleador99", puntos: 18 },
                    { nombre: "Fanático Latam", puntos: 12 }
                ]);
                renderPartidos([
                    { ID: "1", "Equipo A": "Argentina", "Equipo B": "Brasil", Fecha: "20/06/2024", Hora: "18:00" },
                    { ID: "2", "Equipo A": "España", "Equipo B": "Alemania", Fecha: "21/06/2024", Hora: "14:00" }
                ]);
            }
        }

        function renderRanking(ranking) {
            const container = document.getElementById('rankingContainer');
            container.innerHTML = '';
            ranking.forEach((u, i) => {
                const colors = ['border-yellow-500 shadow-yellow-500/10', 'border-slate-300 shadow-slate-300/10', 'border-orange-400 shadow-orange-400/10'];
                const icons = ['fa-medal text-yellow-500', 'fa-medal text-slate-300', 'fa-medal text-orange-400'];
                container.innerHTML += `
                    <div class="glass p-5 rounded-2xl border-l-4 ${colors[i] || 'border-blue-500'} flex justify-between items-center shadow-lg transition-transform hover:scale-105">
                        <div class="flex items-center gap-3">
                            <i class="fas ${icons[i] || 'fa-user'} text-xl"></i>
                            <div>
                                <span class="text-[10px] uppercase font-bold text-gray-400 tracking-widest">Puesto ${i+1}</span>
                                <p class="font-bold truncate w-24 md:w-full">${u.nombre}</p>
                            </div>
                        </div>
                        <div class="text-2xl font-black text-blue-400">${u.puntos}</div>
                    </div>
                `;
            });
        }

        function renderPartidos(partidos) {
            const list = document.getElementById('partidosList');
            list.innerHTML = '';
            if(!partidos || partidos.length === 0) {
                list.innerHTML = `<div class="p-10 text-center glass rounded-3xl text-gray-500">No hay partidos disponibles.</div>`;
                return;
            }

            partidos.forEach(p => {
                list.innerHTML += `
                    <div class="glass p-6 rounded-3xl flex flex-col md:flex-row items-center justify-between gap-6 transition-all hover:bg-white/[0.07]">
                        <div class="text-center md:text-left flex-1">
                            <div class="inline-block px-3 py-1 rounded-full bg-blue-500/10 text-[10px] text-blue-400 font-bold uppercase mb-2">
                                ${p.Fecha} • ${p.Hora}
                            </div>
                            <div class="flex items-center justify-center md:justify-start gap-4">
                                <span class="text-lg font-bold">${p['Equipo A']}</span>
                                <span class="text-xs text-slate-500 font-bold italic">VS</span>
                                <span class="text-lg font-bold">${p['Equipo B']}</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-3 bg-slate-900/50 p-3 rounded-2xl border border-slate-700/50">
                            <input type="number" id="predA_${p.ID}" min="0" placeholder="0" class="w-14 h-12 bg-slate-800 border border-slate-700 rounded-xl text-center font-bold text-xl focus:ring-2 focus:ring-blue-500 outline-none">
                            <span class="text-slate-600 font-bold">:</span>
                            <input type="number" id="predB_${p.ID}" min="0" placeholder="0" class="w-14 h-12 bg-slate-800 border border-slate-700 rounded-xl text-center font-bold text-xl focus:ring-2 focus:ring-blue-500 outline-none">
                            <button onclick="enviarPrediccion('${p.ID}')" class="ml-2 bg-blue-600 hover:bg-blue-500 h-12 px-6 rounded-xl text-xs font-black uppercase tracking-tighter transition-all active:scale-95 shadow-lg shadow-blue-600/20">
                                Guardar
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function enviarPrediccion(idPartido) {
            const gA = document.getElementById(`predA_${idPartido}`).value;
            const gB = document.getElementById(`predB_${idPartido}`).value;

            if(gA === "" || gB === "") {
                showToast("Ingresa ambos marcadores");
                return;
            }

            if (isGAS) {
                google.script.run.withSuccessHandler(res => {
                    showToast("¡Predicción registrada!");
                    loadDashboardData();
                }).guardarPrediccion(currentUser.id, idPartido, parseInt(gA), parseInt(gB));
            } else {
                showToast("Simulación: Predicción guardada (" + gA + " - " + gB + ")");
                console.log("Predicción enviada:", { partido: idPartido, goles: [gA, gB] });
            }
        }

        function showToast(msg) {
            // Una alerta personalizada sencilla para evitar el bloqueo del navegador
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-5 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-6 py-3 rounded-full text-sm font-bold shadow-2xl z-50 animate-bounce';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
